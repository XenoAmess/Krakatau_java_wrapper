version: 2
updates:
  # Maven dependencies
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "daily"
      time: "08:00"
      timezone: "Asia/Shanghai"
    target-branch: "master"
    open-pull-requests-limit: 100
    reviewers:
      - "XenoAmess"
    assignees:
      - "XenoAmess"
    commit-message:
      prefix: "deps"
      include: "scope"
    # 允许更新锁定文件
    versioning-strategy: increase-if-necessary

  # GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Asia/Shanghai"
    target-branch: "master"
    open-pull-requests-limit: 100
    reviewers:
      - "XenoAmess"
    assignees:
      - "XenoAmess"
    commit-message:
      prefix: "ci"
      include: "scope"
