name: Dependabot auto-merge

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Check if auto-merge applicable
        id: check
        run: |
          UPDATE_TYPE="${{ steps.meta.outputs.update-type }}"
          HEAD_REF="${{ github.event.pull_request.head.ref }}"
          echo "Update type: $UPDATE_TYPE"
          echo "Head ref: $HEAD_REF"
          if [[ "$UPDATE_TYPE" == "version-update:semver-patch" ]] || \
             [[ "$UPDATE_TYPE" == "version-update:semver-minor" ]] || \
             { [[ "$UPDATE_TYPE" == "version-update:semver-major" ]] && [[ "$HEAD_REF" == dependabot/github_actions/* ]]; }; then
            echo "should_merge=true" >> $GITHUB_OUTPUT
            echo "✅ Auto-merge applicable for $UPDATE_TYPE"
          else
            echo "should_merge=false" >> $GITHUB_OUTPUT
            echo "❌ Auto-merge skipped for $UPDATE_TYPE (maven major left for human review)"
          fi

      - name: Approve dependabot PR
        if: steps.check.outputs.should_merge == 'true'
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge (rebase)
        if: steps.check.outputs.should_merge == 'true'
        run: gh pr merge --auto --rebase "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
